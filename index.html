<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación de Gol</title>
    <style>
        @font-face {
            font-family: 'ULTRASans-Bold';
            src: url('./assets/fonts/ULTRASans-Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: 'ULTRASans-Regular';
            src: url('./assets/fonts/ULTRASans-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Contenedor principal */
        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 768px;
            height: 320px;
            background-color: #000;
            transform-origin: top left;
            overflow: hidden;
        }

        /* Video de fondo (remplaza a la imagen de fondo) */
        .video-fondo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; /* Ocupa todo el ancho y alto sin recortar (puede estirarse) */
            z-index: 0;
        }

        /* Capa del gol (imagen o video) */
        .gol-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; /* Ocupa todo el ancho y alto sin recortar */
            opacity: 0; 
            z-index: 20;
        }

        /* Clases activas cuando hay gol (Se asignan desde Javascript) */
        .is-goal .gol-overlay { animation: showGoal 7s linear forwards; animation-delay: var(--delay, 0ms); }

        /* Keyframes del fade del video de gol */
        @keyframes showGoal {
            0% { opacity: 0; }
            43.28% { opacity: 0; } /* 3.03s (3030 / 7000) */
            50.00% { opacity: 1; } /* Termina el fade in suave */
            88.14% { opacity: 1; } /* 6.17s (6170 / 7000) */
            92.14% { opacity: 0; } /* Se desvanece */
            100% { opacity: 0; }
        }
        
        /* Texto de prueba (Opcional) */
        h1 {
            color: white;
            z-index: 10;
            font-family: Arial, sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Estilos del marcador (Ajustado para 768x320) */
        .scoreboard {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: #ffffff;
            font-family: 'ULTRASans', 'Impact', sans-serif;
            z-index: 10;
            width: 100%;
            gap: 7px;
        }

        .team-group {
            display: flex;
            align-items: center;
            flex: 1; /* Ocupa mitad y mitad para forzar el centro perfecto */
            gap: 22px;
        }

        .home-group {
            justify-content: flex-end;
        }

        .away-group {
            justify-content: flex-start;
        }

        .team-score {
            font-family: 'ULTRASans-Bold', sans-serif;
            font-size: 4rem;
            font-weight: bold;
            line-height: 1;
            transform: scaleY(0.8);
        }

        .team-name {
            position: relative;
            font-family: 'ULTRASans-Bold', sans-serif;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
            margin: 0;
            z-index: 1;
        }

        .team-name::before {
            content: attr(data-text);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.6);
            opacity: 0.25;
            color: #c5c5c5;
            z-index: -1;
            white-space: nowrap;
        }

        .team-logo {
            width: 68px;
            height: 52px;
            border-radius: 50%;
            border: 5px solid white;
            background-color: white;
            object-fit: cover;
            z-index: 1;
        }

        .match-time {
            font-family: 'ULTRASans-Regular', sans-serif;
            font-size: 26px;
            font-weight: normal;
            transform: scaleY(0.9);
            letter-spacing: 2px;
            margin: 0 22px;
            width: 107px;
            text-align: center;
            flex-shrink: 0;
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="loading-overlay"></div>

    <div class="container">
        <!-- Video de fondo (siempre reproduciéndose en bucle) -->
        <video class="video-fondo" autoplay muted loop playsinline>
            <source src="./assets/plantilla_mundial_score.mp4" type="video/mp4">
        </video>

        <!-- Video del gol superpuesto con animación CSS -->
        <video class="gol-overlay" muted playsinline>
            <source src="./assets/plantilla_mundial_gol.mp4" type="video/mp4">
        </video>


        <!-- Marcador superpuesto -->
        <div class="scoreboard" id="scoreboard" style="display: none;">
            <div class="team-group home-group">
                <span class="team-name" id="home-name" data-text="LOCAL">LOCAL</span>
                <img class="team-logo" id="home-logo" src="" alt="Home">
                <span class="team-score" id="home-score">0</span>
            </div>
            
            <span class="match-time" id="match-time">45:00</span>
            
            <div class="team-group away-group">
                <span class="team-score" id="away-score">0</span>
                <img class="team-logo" id="away-logo" src="" alt="Away">
                <span class="team-name" id="away-name" data-text="VISITA">VISITA</span>
            </div>
        </div>
        
    </div>

    <script>
        // --- ESCALADO AUTOMÁTICO --- 
        function ajustarEscala() {
            const container = document.querySelector('.container');
            const scaleX = window.innerWidth / 768;
            const scaleY = window.innerHeight / 320;
            container.style.transform = `scale(${scaleX}, ${scaleY})`;
        }
        window.addEventListener('resize', ajustarEscala);
        ajustarEscala();

        // Guardamos el momento exacto en el que el HTML se empezó a mostrar
        const pageLoadTime = Date.now();

        let globalPartido = null;
        let globalFixtureId = null;

        const updateVisualTime = () => {
            if (!globalPartido) return;
            const p = globalPartido;
            const timeEl = document.getElementById('match-time');
            
            if (p.estado === 'finalizado') {
                timeEl.innerText = "FT";
                return;
            } else if (p.estado === 'no_iniciado') {
                timeEl.innerText = "vs";
                return;
            } else if (p.estado === 'descanso' || (p.tiempo && (p.tiempo.codigo === 'MT' || p.tiempo.codigo === 'HT'))) {
                timeEl.innerText = p.tiempo.texto || "Descanso";
                return;
            }

            if (p.tiempo && p.tiempo.minuto !== null && p.estado === 'en_juego') {
                const baseMin = parseInt(p.tiempo.minuto) || 0;
                const extraMin = parseInt(p.tiempo.minuto_extra) || 0;
                const apiMinute = baseMin + extraMin;

                const savedMin = localStorage.getItem(`alac_min_${globalFixtureId}`);
                const savedTime = localStorage.getItem(`alac_min_start_${globalFixtureId}`);
                
                let seconds = 0;
                if (savedMin == apiMinute && savedTime) {
                    seconds = Math.floor((Date.now() - parseInt(savedTime)) / 1000);
                } else {
                    localStorage.setItem(`alac_min_${globalFixtureId}`, apiMinute);
                    localStorage.setItem(`alac_min_start_${globalFixtureId}`, Date.now());
                }
                
                let displaySeconds = seconds > 59 ? 59 : seconds; // Limitar a 59s
                const secStr = displaySeconds < 10 ? '0' + displaySeconds : displaySeconds;
                timeEl.innerText = `${apiMinute}:${secStr}`;
            } else if (p.tiempo && p.tiempo.texto) {
                timeEl.innerText = p.tiempo.texto;
            } else {
                timeEl.innerText = "";
            }
        };

        setInterval(updateVisualTime, 1000);

        const container = document.querySelector('.container');
        const videoFondo = document.querySelector('.video-fondo');
        const golVideo = document.querySelector('.gol-overlay');
        const loadingOverlay = document.getElementById('loading-overlay');

        // --- LÓGICA DE CARGA (PANTALLA NEGRA) ---
        let dataLoaded = false;
        let videoFondoLoaded = false;
        let golOverlayLoaded = false;
        let fontsLoadedFlag = false;

        document.fonts.ready.then(() => {
            fontsLoadedFlag = true;
            checkAllLoaded();
        });

        function checkAllLoaded() {
            if (dataLoaded && videoFondoLoaded && golOverlayLoaded && fontsLoadedFlag) {
                // Damos un pequeño respiro de 100ms al navegador para renderizar el DOM y evitar saltos
                setTimeout(() => {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => { loadingOverlay.style.display = 'none'; }, 500);
                }, 100);
            }
        }

        const checkVideoLoad = (video, setLoadedFlag) => {
            if (video.readyState >= 4) {
                setLoadedFlag();
            } else {
                video.addEventListener('canplaythrough', setLoadedFlag, { once: true });
                video.addEventListener('loadeddata', setLoadedFlag, { once: true }); // Fallback
            }
        };

        const checkBackgroundPlaying = (video, setLoadedFlag) => {
            // Asegurarnos de que el video de fondo realmente ha empezado a reproducir al menos un frame
            if (video.currentTime > 0) {
                setLoadedFlag();
            } else {
                video.addEventListener('timeupdate', () => {
                    setLoadedFlag();
                }, { once: true });
            }
        };

        checkBackgroundPlaying(videoFondo, () => { videoFondoLoaded = true; checkAllLoaded(); });
        checkVideoLoad(golVideo, () => { golOverlayLoaded = true; checkAllLoaded(); });

        // Fallback: si después de 10 segundos no carga algo, mostramos de todos modos
        setTimeout(() => {
            if (loadingOverlay.style.display !== 'none') {
                loadingOverlay.style.opacity = '0';
                setTimeout(() => { loadingOverlay.style.display = 'none'; }, 500);
            }
        }, 10000);
        
        // Cuando inicia la animación CSS de gol, esperamos a que llegue al 3.03s del tiempo general del contenido
        golVideo.addEventListener('animationstart', () => {
            golVideo.pause();
            golVideo.currentTime = 0;
            const elapsed = Date.now() - pageLoadTime;
            const waitTime = Math.max(0, 3030 - elapsed);
            setTimeout(() => {
                golVideo.play().catch(e => console.error("Error al reproducir el video:", e));
            }, waitTime);
        });

        const resetAnimations = () => {
            container.classList.remove('is-goal');
            golVideo.pause();
            golVideo.currentTime = 0;
        };

        // Cuando termina la animación de gol, reseteamos las clases para que esté listo para el próximo
        golVideo.addEventListener('animationend', resetAnimations);

        // --- CONEXIÓN AL NUEVO API ---
        const API_URL = 'https://alacapipollamundialista.alacoohperu.pe/api/public';

        // Variables de estado
        let currentHomeScore = 0;
        let currentAwayScore = 0;

        // Función auxiliar para abreviar el nombre del equipo
        const getShortName = (name, codigo_iso) => {
            if (codigo_iso && codigo_iso.trim()) return codigo_iso.trim().toUpperCase();
            return name ? name.substring(0, 3).toUpperCase() : "";
        };

        // Función inicial para cargar datos del partido
        async function fetchInitialFixtureData(fixtureId) {
            try {
                // Consultar listado por fixture_id
                const response = await fetch(`${API_URL}/partidos?id=${fixtureId}`, { cache: "no-store" });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                
                // Al buscar por filtro, esperamos un arreglo dentro de 'partidos'
                if (data && data.partidos && data.partidos.length > 0) {
                    const partido = data.partidos[0];
                    globalPartido = partido;
                    const local = partido.local;
                    const visitante = partido.visitante;
                    const marcador = partido.marcador;

                    const nuevoHome = parseInt(marcador.local) || 0;
                    const nuevoAway = parseInt(marcador.visitante) || 0;

                    // Revisar memoria (localStorage) para ver cómo quedó el partido la última vez
                    const savedHomeStr = localStorage.getItem(`alac_home_${fixtureId}`);
                    const savedAwayStr = localStorage.getItem(`alac_away_${fixtureId}`);
                    const savedHome = savedHomeStr !== null ? parseInt(savedHomeStr) : null;
                    const savedAway = savedAwayStr !== null ? parseInt(savedAwayStr) : null;

                    let isHiddenGoal = false;

                    // Si teníamos un marcador anterior guardado y el nuevo es MAYOR, hubo gol mientras no estábamos
                    if (savedHome !== null && savedAway !== null && (nuevoHome > savedHome || nuevoAway > savedAway)) {
                        isHiddenGoal = true;
                        // Pintamos la pantalla temporalmente con el marcador VIEJO
                        currentHomeScore = savedHome;
                        currentAwayScore = savedAway;
                    } else {
                        // Pintamos con el marcador actual normal
                        currentHomeScore = nuevoHome;
                        currentAwayScore = nuevoAway;
                    }

                    // Mostrar el contenedor del marcador
                    document.getElementById('scoreboard').style.display = 'flex';
                    
                    // Asignar datos del local
                    const homeLogoUrl = local.bandera_url || local.bandera || local.logo;
                    if (homeLogoUrl) document.getElementById('home-logo').src = homeLogoUrl;
                    const homeNameText = getShortName(local.nombre, local.codigo_iso);
                    document.getElementById('home-name').innerText = homeNameText;
                    document.getElementById('home-name').setAttribute('data-text', homeNameText);
                    document.getElementById('home-score').innerText = currentHomeScore;

                    // Asignar datos del visitante
                    const awayLogoUrl = visitante.bandera_url || visitante.bandera || visitante.logo;
                    if (awayLogoUrl) document.getElementById('away-logo').src = awayLogoUrl;
                    const awayNameText = getShortName(visitante.nombre, visitante.codigo_iso);
                    document.getElementById('away-name').innerText = awayNameText;
                    document.getElementById('away-name').setAttribute('data-text', awayNameText);
                    document.getElementById('away-score').innerText = currentAwayScore;

                    // Actualizar tiempo en el DOM
                    updateVisualTime();

                    // Guardar el resultado real más reciente en la memoria para la próxima carga
                    localStorage.setItem(`alac_home_${fixtureId}`, nuevoHome);
                    localStorage.setItem(`alac_away_${fixtureId}`, nuevoAway);

                    // Si detectamos un gol mientras estábamos apagados, calculamos el tiempo y lanzamos
                    if (isHiddenGoal) {
                        const elapsed = Date.now() - pageLoadTime;
                        triggerGoalAnimation(nuevoHome, nuevoAway, elapsed);
                    }
                    
                    // Iniciar el chequeo de goles
                    startGoalPolling(fixtureId);
                    
                    // Comprobar que las imágenes se han cargado antes de remover la pantalla negra
                    const homeImg = document.getElementById('home-logo');
                    const awayImg = document.getElementById('away-logo');
                    
                    let homeImgLoaded = !homeLogoUrl;
                    let awayImgLoaded = !awayLogoUrl;

                    const finishDataLoad = () => {
                        if (homeImgLoaded && awayImgLoaded && !dataLoaded) {
                            dataLoaded = true;
                            checkAllLoaded();
                        }
                    };

                    if (homeLogoUrl) {
                        if (homeImg.complete) homeImgLoaded = true;
                        else {
                            homeImg.onload = () => { homeImgLoaded = true; finishDataLoad(); };
                            homeImg.onerror = () => { homeImgLoaded = true; finishDataLoad(); };
                        }
                    }
                    if (awayLogoUrl) {
                        if (awayImg.complete) awayImgLoaded = true;
                        else {
                            awayImg.onload = () => { awayImgLoaded = true; finishDataLoad(); };
                            awayImg.onerror = () => { awayImgLoaded = true; finishDataLoad(); };
                        }
                    }
                    finishDataLoad();
                } else {
                    console.error("No se encontró el partido con fixture_id:", fixtureId);
                    console.log("Reintentando obtener datos en 3 segundos...");
                    setTimeout(() => fetchInitialFixtureData(fixtureId), 3000);
                }
            } catch (error) {
                console.error(`Error al consultar el partido inicial ${fixtureId}:`, error);
                console.log("Reintentando obtener datos en 3 segundos...");
                setTimeout(() => fetchInitialFixtureData(fixtureId), 3000);
            }
        }

        // Función para activar visualmente el gol sincronizado
        function triggerGoalAnimation(newHomeScore, newAwayScore, timeElapsed = 0) {
            console.log(`¡GOL DETECTADO! Sincronizando animación con retraso de ${timeElapsed}ms...`);
            
            // Actualizar variables de estado internas
            currentHomeScore = newHomeScore;
            currentAwayScore = newAwayScore;

            // Adelantar toda la animación CSS usando un delay negativo igual al tiempo transcurrido
            container.style.setProperty('--delay', `-${timeElapsed}ms`);

            // Reproducir toda la animación CSS y video agregando la clase 'is-goal' al contenedor
            container.classList.add('is-goal');

            // Actualizar el DOM exactamente a los 3500ms del tiempo global del anuncio
            const domUpdateWait = Math.max(0, 3500 - timeElapsed);
            setTimeout(() => {
                document.getElementById('home-score').innerText = newHomeScore;
                document.getElementById('away-score').innerText = newAwayScore;
            }, domUpdateWait);
        }

        // --- POLLING (Consulta periódica para detectar goles) ---
        function startGoalPolling(fixtureId) {
            console.log("Iniciando consulta constante para detectar goles...");
            
            // Revisa cada 1 segundo (1000ms)
            setInterval(async () => {
                try {
                    const response = await fetch(`${API_URL}/partidos?id=${fixtureId}`, { cache: "no-store" });
                    const result = await response.json();
                    
                    if (result && result.partidos && result.partidos.length > 0) {
                        const partido = result.partidos[0];
                        globalPartido = partido;
                        updateVisualTime();

                        const nuevoHome = parseInt(partido.marcador.local) || 0;
                        const nuevoAway = parseInt(partido.marcador.visitante) || 0;

                        // Si alguno de los puntajes es mayor al que teníamos guardado, ¡hubo un gol en vivo!
                        if (nuevoHome > currentHomeScore || nuevoAway > currentAwayScore) {
                            const timeElapsed = Date.now() - pageLoadTime;
                            
                            // Límite de tiempo para sincronizar: 3030ms para ambos, ya que la animación de círculos también inicia en el segundo 3.03.
                            const maxSyncTime = 3030;

                            // Si estamos dentro del límite de tiempo, lanzamos la animación
                            if (timeElapsed <= maxSyncTime) {
                                triggerGoalAnimation(nuevoHome, nuevoAway, timeElapsed);
                                // Actualizar la memoria permanente
                                localStorage.setItem(`alac_home_${fixtureId}`, nuevoHome);
                                localStorage.setItem(`alac_away_${fixtureId}`, nuevoAway);
                            } else {
                                // Si pasamos el tiempo, la animación no alcanzaría a mostrarse bien.
                                console.log(`Gol detectado muy tarde (${timeElapsed}ms). Se pospone la animación para la siguiente pasada.`);
                                
                                // Actualizamos memoria local para no repetir este log, 
                                // pero dejamos el localStorage SIN ACTUALIZAR. 
                                // Así, en la próxima carga de la página, detectará un gol oculto al instante.
                                currentHomeScore = nuevoHome;
                                currentAwayScore = nuevoAway;
                            }
                        }
                    }
                } catch (err) {
                    console.error("Error consultando endpoint de gol:", err);
                }
            }, 1000);
        }

        // Obtener el ID de la URL y arrancar
        const urlParams = new URLSearchParams(window.location.search);
        let fixtureId = urlParams.get('id');

        if (!fixtureId) {
            console.log("No se proporcionó ID en la URL. Usando el ID 9 por defecto.");
            fixtureId = 9;
        }
        
        globalFixtureId = fixtureId;

        fetchInitialFixtureData(fixtureId);
    </script>
</body>
</html>
